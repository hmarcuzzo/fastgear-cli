name: Lint

on:
  workflow_call:

jobs:
  ruff:
    name: Ruff
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          python-version: "3.14"

      - name: Ruff format check
        run: uvx ruff format --check .

      - name: Ruff lint
        run: uvx ruff check .
