default_stages: [pre-commit]

default_language_version:
  python: python3.12

repos:
  # Run the Ruff linter.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.9 # pre-commit-ci autoupdate
    hooks:
      # Linter
      - id: ruff
        exclude: ^fastgear_cli/templates/
      # Formatter
      - id: ruff-format
        exclude: ^fastgear_cli/templates/