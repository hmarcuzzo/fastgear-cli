name: Audit

on:
  workflow_call:

jobs:
  audit:
    name: Pip Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          python-version: "3.14"

      - name: Pip audit
        run: |
          uv export --no-dev --no-hashes --format requirements-txt > /tmp/requirements-audit.txt
          uv run --with pip-audit pip-audit -r /tmp/requirements-audit.txt
