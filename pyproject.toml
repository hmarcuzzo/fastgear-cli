[project]
name = "fastgear-cli"
version = "0.5.3"
description = "CLI tool for generating FastAPI boilerplate code using the Fastgear library"
authors = [
    { name = "Henrique Marcuzzo", email = "henrique.souza.m06@gmail.com"}
]
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "jinja2>=3.1.6",
    "pydantic>=2.12.5",
    "questionary>=2.1.1",
    "ruff>=0.15.0",
    "typer>=0.21.1",
]

[dependency-groups]
dev = [
    # ----------------------------------------
    # Code quality
    # ----------------------------------------
    "pre-commit>=4.5.1",
    "python-semantic-release>=10.5.3",
]
test = [
    "pytest>=8.0.0",
    "pytest-cov>=6.0.0",
    "pytest-mock>=3.14.0",
    "pytest-testdox>=3.1.0",
]

[tool.hatch.build.targets.wheel]
packages = ["fastgear_cli"]

[project.scripts]
fg = "fastgear_cli.cli.app:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"


# ==== pytest ====
[tool.pytest.ini_options]
minversion = "8.0.0"
addopts = "-ra -q --force-testdox --cov=fastgear_cli --cov-branch --cov-report=xml"
testpaths = ["tests/"]

# ==== Semantic Release ====
[tool.semantic_release]
commit_message = """\
🔖 Release version {version}

Automatically generated by python-semantic-release
"""
tag_format = "{version}"
version_toml = [
    "pyproject.toml:project.version",
]
version_variables = ["fastgear_cli/__init__.py:__version__"]
vcs_release = true
build_command = "uv lock && git add uv.lock"
